name: Daily report

on:
  schedule:
    # Both fire so 8:00 AM America/Chicago is covered year-round:
    # 13:00 UTC = 8 AM CDT (summer), 14:00 UTC = 8 AM CST (winter).
    # The guard step lets only the correct one proceed.
    - cron: "0 13 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Check it is 8 AM Central (or a manual run)
        id: guard
        run: |
          HOUR=$(TZ=America/Chicago date +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$HOUR" = "08" ]; then
            echo "Guard passed (CT hour: $HOUR)"
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Not 8 AM CT (hour: $HOUR) — this is the off-season cron. Skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.run == 'true'

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.run == 'true'
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Generate and deliver today's report
        if: steps.guard.outputs.run == 'true'
        env:
          PRIVATE_CONFIG_JSON: ${{ secrets.PRIVATE_CONFIG_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/main.py

      - name: Commit published data
        if: steps.guard.outputs.run == 'true'
        run: |
          git config user.name "almanac-bot"
          git config user.email "almanac-bot@users.noreply.github.com"
          git add docs/data state.json
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "Daily report $(TZ=America/Chicago date +%F)"
            git push
          fi
