name: Daily report

on:
  schedule:
    # HARD REQUIREMENT: report available by 8:45 AM America/Chicago.
    # Earlier is fine. GitHub cron delays/drops individual slots, so four
    # attempts an hour apart + the dedupe below = exactly one publish from
    # whichever attempt lands first, with wide margin before the deadline.
    # Summer (CDT): 5:20 / 6:20 / 7:20 / 8:20 AM CT.
    # Winter (CST): 4:20 / 5:20 / 6:20 / 7:20 AM CT.
    # Minute :20 dodges the congested top-of-hour slots.
    - cron: "20 10 * * *"
    - cron: "20 11 * * *"
    - cron: "20 12 * * *"
    - cron: "20 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decide whether to run (one publish per day, 4:00-11:59 CT)
        id: guard
        run: |
          TODAY=$(TZ=America/Chicago date +%F)
          HM=$((10#$(TZ=America/Chicago date +%H%M)))
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run — proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ -f "docs/data/reports/$TODAY.json" ]; then
            echo "Report for $TODAY already published — nothing to do."
            echo "run=false" >> "$GITHUB_OUTPUT"
          elif [ "$HM" -ge 400 ] && [ "$HM" -lt 1200 ]; then
            echo "In window (CT $HM) — proceeding."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "Outside window (CT $HM) — stale delay or odd hour. Skipping."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-python@v5
        if: steps.guard.outputs.run == 'true'
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: pip install -r requirements.txt

      - name: Generate and deliver today's report
        if: steps.guard.outputs.run == 'true'
        env:
          PRIVATE_CONFIG_JSON: ${{ secrets.PRIVATE_CONFIG_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/main.py

      - name: Commit published data
        if: steps.guard.outputs.run == 'true'
        run: |
          git config user.name "almanac-bot"
          git config user.email "almanac-bot@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add docs/data state.json
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "Daily report $(TZ=America/Chicago date +%F)"
            git push
          fi
