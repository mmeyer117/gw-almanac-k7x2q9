<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="theme-color" content="#101418">
<meta name="description" content="A daily almanac.">
<title>The Gateway Almanac</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=JetBrains+Mono:wght@500;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="masthead" id="masthead">
  <div class="masthead-inner">
    <div class="brand">
      <span class="brand-arch" aria-hidden="true"></span>
      <span class="brand-name">The Gateway Almanac</span>
    </div>
    <div class="flap-row" id="flap-date" aria-live="polite"></div>
    <div class="day-nav" id="day-nav" hidden>
      <button class="day-btn" id="prev-day" aria-label="Previous day">‹</button>
      <span class="day-hint" id="day-hint">swipe for more days</span>
      <button class="day-btn" id="next-day" aria-label="Next day">›</button>
    </div>
  </div>
</header>

<main id="view" class="view" tabindex="-1"></main>

<nav class="tabbar" aria-label="Sections">
  <a href="#/today" data-tab="today" class="tab">
    <span class="tab-ico" aria-hidden="true">☀</span><span>Today</span>
  </a>
  <a href="#/archive" data-tab="archive" class="tab">
    <span class="tab-ico" aria-hidden="true">▦</span><span>Archive</span>
  </a>
  <a href="#/stats" data-tab="stats" class="tab">
    <span class="tab-ico" aria-hidden="true">▥</span><span>Stats</span>
  </a>
</nav>

<script src="js/flap.js"></script>
<script src="js/share.js"></script>
<script src="js/app.js"></script>
</body>
</html>
